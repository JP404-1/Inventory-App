<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Manager PWA</title>
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/@zxing/browser@0.1.5/umd/index.min.js"></script>
<style>
:root {
  color-scheme: dark;
  --bg: #0b1220;
  --panel: #162033;
  --panel-2: #1d2940;
  --text: #e5edf7;
  --muted: #9fb0c8;
  --accent: #3fb68b;
  --accent-2: #2d8f6c;
  --danger: #ef6b73;
  --border: rgba(159, 176, 200, 0.18);
  --shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  background:
    radial-gradient(circle at top, rgba(63, 182, 139, 0.18), transparent 35%),
    linear-gradient(180deg, #0c1424 0%, #0b1220 100%);
  color: var(--text);
}

header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  background: rgba(11, 18, 32, 0.88);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}

h1,
h2,
h3,
h4,
p {
  margin: 0;
}

h1 {
  font-size: 1.2rem;
}

button,
input {
  font: inherit;
}

button {
  border: 0;
  border-radius: 999px;
  background: var(--accent);
  color: #082015;
  cursor: pointer;
  padding: 0.65rem 1rem;
  font-weight: 700;
  transition: transform 120ms ease, background 120ms ease;
}

button:hover {
  background: #56c89e;
  transform: translateY(-1px);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.5;
  transform: none;
}

button.secondary {
  background: var(--panel-2);
  color: var(--text);
  border: 1px solid var(--border);
}

button.danger {
  background: rgba(239, 107, 115, 0.14);
  color: #ffd7da;
  border: 1px solid rgba(239, 107, 115, 0.25);
}

.app-shell {
  width: min(1100px, calc(100% - 2rem));
  margin: 1.5rem auto 2rem;
}

.summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem;
  margin-bottom: 1rem;
}

.panel,
.card,
.item-card,
.tile {
  background: linear-gradient(180deg, rgba(29, 41, 64, 0.92), rgba(22, 32, 51, 0.96));
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.panel {
  padding: 1rem;
}

.summary-value {
  font-size: 1.9rem;
  font-weight: 800;
  margin-top: 0.25rem;
}

.muted {
  color: var(--muted);
}

.toolbar {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 0.75rem;
  margin-bottom: 1rem;
}

input {
  width: 100%;
  padding: 0.9rem 1rem;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: rgba(10, 17, 29, 0.85);
  color: var(--text);
}

.view-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
  padding: 0.9rem 1rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(10, 17, 29, 0.55);
}

.view-title {
  font-size: 1.05rem;
}

.content {
  display: grid;
  gap: 1rem;
}

.card {
  padding: 1rem;
}

.tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0.85rem;
}

.tile {
  min-height: 150px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 1rem;
  padding: 1rem;
  color: var(--text);
  outline: none;
  transition: border-color 120ms ease, transform 120ms ease, background 120ms ease;
}

.tile[role="button"] {
  cursor: pointer;
}

.tile[role="button"]:hover,
.tile[role="button"]:focus-visible {
  border-color: rgba(63, 182, 139, 0.62);
  transform: translateY(-1px);
}

.tile-title {
  font-size: 1.05rem;
}

.tile-stats,
.tile-actions {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  align-items: center;
}

.tile-actions {
  justify-content: flex-end;
}

.card-header,
.item-header,
.action-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.items-list {
  display: grid;
  gap: 0.75rem;
  margin-top: 1rem;
}

.item-card {
  padding: 1rem;
}

.item-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 1rem;
}

.price-line {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-top: 0.6rem;
}

.pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 0.24rem 0.55rem;
  background: rgba(63, 182, 139, 0.12);
  color: #baf0d9;
  font-size: 0.82rem;
  font-weight: 700;
}

.pill.loss {
  background: rgba(239, 107, 115, 0.14);
  color: #ffd7da;
}

.thumb {
  width: 110px;
  aspect-ratio: 1 / 1;
  border-radius: 16px;
  object-fit: cover;
  border: 1px solid var(--border);
  background: #0b1220;
}

.empty-state {
  padding: 1.5rem;
  text-align: center;
  color: var(--muted);
  border: 1px dashed var(--border);
  border-radius: 18px;
}

.scanner-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.9);
  padding: 1rem;
}

.scanner-panel {
  width: min(560px, 100%);
  display: grid;
  gap: 0.75rem;
}

.scanner-video {
  width: 100%;
  border-radius: 20px;
  overflow: hidden;
  background: #000;
}

.scanner-video video {
  width: 100%;
  display: block;
}

.access-denied {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 2rem;
  text-align: center;
}

a {
  color: #93d6bb;
}

@media (max-width: 720px) {
  .toolbar,
  .item-grid,
  .view-bar {
    grid-template-columns: 1fr;
  }

  .view-bar {
    align-items: flex-start;
    flex-direction: column;
  }

  header {
    align-items: flex-start;
  }
}
</style>
</head>
<body>
<header>
  <div>
    <h1>Inventory Manager</h1>
    <p class="muted">Track collections, items, and receipts by room offline.</p>
  </div>
  <div class="action-row">
    <button id="installBtn" class="secondary" hidden>Install App</button>
  </div>
</header>

<main class="app-shell">
  <section class="summary">
    <div class="panel">
      <p class="muted">Total Value</p>
      <div class="summary-value">$<span id="totalValue">0.00</span></div>
    </div>
    <div class="panel">
      <p class="muted">Rooms</p>
      <div class="summary-value" id="roomCount">0</div>
    </div>
    <div class="panel">
      <p class="muted">Collections</p>
      <div class="summary-value" id="collectionCount">0</div>
    </div>
    <div class="panel">
      <p class="muted">Items</p>
      <div class="summary-value" id="itemCount">0</div>
    </div>
  </section>

  <section class="toolbar">
  <input id="search" type="search" placeholder="Search rooms, collections, or items...">

  <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
    <button id="scanBtn">Scan Barcode</button>
    <button id="addItemBtn" class="secondary">Add Item</button>
    <button id="homeBtn" class="secondary" hidden>Home</button>
    <button id="addRoomBtn" class="secondary">Add Room</button>
    <button id="addCollectionBtn" class="secondary">Add Collection</button>
  </div>
</section>

  <section class="view-bar">
    <div>
      <p id="viewEyebrow" class="muted">Dashboard</p>
      <h2 id="viewTitle" class="view-title">Rooms</h2>
    </div>
    <div id="viewNav" class="action-row"></div>
  </section>

  <section id="collections" class="content" aria-live="polite"></section>
</main>

<script>
const DB_NAME = "inventoryDB";
const DB_VERSION = 3;
const STORE_ROOMS = "rooms";
const STORE_COLLECTIONS = "collections";
const STORE_ITEMS = "items";
const STORE_AUTH = "auth";
const FALLBACK_PRICE = null;
const PRICE_LOOKUP_TIMEOUT_MS = 8000;
let db;
let deferredPrompt = null;
let isAddingItem = false;
let currentRoomId = null;
let currentCollectionId = null;
const activeObjectUrls = new Set();

function requestToPromise(request) {
  return new Promise((resolve, reject) => {
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error("IndexedDB request failed"));
  });
}

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);

    request.onupgradeneeded = event => {
      const nextDb = event.target.result;

      if (!nextDb.objectStoreNames.contains(STORE_ROOMS)) {
        nextDb.createObjectStore(STORE_ROOMS, { keyPath: "id", autoIncrement: true });
      }

      if (!nextDb.objectStoreNames.contains(STORE_COLLECTIONS)) {
        const collectionStore = nextDb.createObjectStore(STORE_COLLECTIONS, { keyPath: "id", autoIncrement: true });
        collectionStore.createIndex("roomId", "roomId", { unique: false });
      }

      if (!nextDb.objectStoreNames.contains(STORE_ITEMS)) {
        const itemStore = nextDb.createObjectStore(STORE_ITEMS, { keyPath: "id", autoIncrement: true });
        itemStore.createIndex("collectionId", "collectionId", { unique: false });
      }

      if (!nextDb.objectStoreNames.contains(STORE_AUTH)) {
        nextDb.createObjectStore(STORE_AUTH, { keyPath: "key" });
      }
    };

    request.onsuccess = event => {
      db = event.target.result;
      resolve(db);
    };

    request.onerror = () => reject(request.error || new Error("Failed to open database"));
  });
}

function store(name, mode = "readonly") {
  return db.transaction(name, mode).objectStore(name);
}

function addRecord(name, value) {
  return requestToPromise(store(name, "readwrite").add(value));
}

function putRecord(name, value) {
  return requestToPromise(store(name, "readwrite").put(value));
}

function deleteRecord(name, key) {
  return requestToPromise(store(name, "readwrite").delete(key));
}

function getAllRecords(name) {
  return requestToPromise(store(name).getAll());
}

function getRecord(name, key) {
  return requestToPromise(store(name).get(key));
}

function createElement(tag, options = {}) {
  const element = document.createElement(tag);

  if (options.className) {
    element.className = options.className;
  }

  if (options.text !== undefined) {
    element.textContent = options.text;
  }

  return element;
}

function formatMoney(value) {
  const amount = Number.isFinite(value) ? value : 0;
  return amount.toFixed(2);
}

function parsePriceInput(message) {
  const raw = prompt(message);
  if (raw === null) {
    return { cancelled: true, value: null };
  }

  const trimmed = raw.trim();
  if (!trimmed) {
    return { cancelled: false, value: null };
  }

  const number = Number(trimmed);
  if (!Number.isFinite(number) || number < 0) {
    alert("Please enter a valid non-negative number.");
    return { cancelled: false, value: undefined };
  }

  return { cancelled: false, value: number };
}

function cleanupObjectUrls() {
  for (const url of activeObjectUrls) {
    URL.revokeObjectURL(url);
  }
  activeObjectUrls.clear();
}

function trackedObjectUrl(file) {
  const url = URL.createObjectURL(file);
  activeObjectUrls.add(url);
  return url;
}

async function hashPIN(pin) {
  const encoded = new TextEncoder().encode(pin);
  const hashBuffer = await crypto.subtle.digest("SHA-256", encoded);
  return Array.from(new Uint8Array(hashBuffer))
    .map(byte => byte.toString(16).padStart(2, "0"))
    .join("");
}

async function verifyPIN() {
  const record = await getRecord(STORE_AUTH, "pin");
  if (!record) {
    return true;
  }

  for (let attempt = 0; attempt < 3; attempt += 1) {
    const input = prompt("Enter PIN:");
    if (input === null) {
      return false;
    }

    const hash = await hashPIN(input.trim());
    if (hash === record.value) {
      return true;
    }

    alert("Incorrect PIN.");
  }

  return false;
}

function showAccessDenied() {
  document.body.innerHTML = "";
  const wrapper = createElement("div", { className: "access-denied" });
  const panel = createElement("div", { className: "panel" });
  const title = createElement("h2", { text: "Access Denied" });
  const message = createElement("p", {
    className: "muted",
    text: "The PIN was not verified. Refresh to try again."
  });

  panel.append(title, message);
  wrapper.appendChild(panel);
  document.body.appendChild(wrapper);
}

function buildItemCard(item) {
  const itemCard = createElement("article", { className: "item-card" });
  const layout = createElement("div", { className: "item-grid" });
  const details = createElement("div");
  const media = createElement("div");
  const titleRow = createElement("div", { className: "item-header" });
  const title = createElement("h4", { text: item.name });
  const diffValue = Number.isFinite(item.purchasePrice) && Number.isFinite(item.currentPrice)
    ? item.currentPrice - item.purchasePrice
    : null;
  const diffLabel = createElement("span", {
    className: diffValue !== null && diffValue < 0 ? "pill loss" : "pill",
    text: diffValue === null ? "No comparison" : `${diffValue >= 0 ? "+" : "-"}$${Math.abs(diffValue).toFixed(2)}`
  });
  const metaText = [
    item.barcode ? `Barcode: ${item.barcode}` : "No barcode saved",
    item.brand ? `Brand: ${item.brand}` : "",
    item.category ? `Category: ${item.category}` : ""
  ].filter(Boolean).join(" | ");
  const meta = createElement("p", { className: "muted", text: metaText });
  const description = item.description
    ? createElement("p", { className: "muted", text: item.description })
    : null;
  const priceLine = createElement("div", { className: "price-line" });
  const currentPrice = createElement("span", {
    text: Number.isFinite(item.currentPrice) ? `Current: $${formatMoney(item.currentPrice)}` : "Current: unknown"
  });
  const purchasePrice = createElement("span", {
    className: "muted",
    text: Number.isFinite(item.purchasePrice) ? `Purchase: $${formatMoney(item.purchasePrice)}` : "Purchase: unknown"
  });
  const updated = createElement("p", {
    className: "muted",
    text: `Updated: ${new Date(item.updated).toLocaleDateString()}`
  });
  const actions = createElement("div", { className: "action-row" });
  const overrideBtn = createElement("button", { className: "secondary", text: "Override Price" });
  const barcodeBtn = createElement("button", {
    className: "secondary",
    text: item.barcode ? "Change Barcode" : "Add Barcode"
  });
  const photoBtn = createElement("button", {
    className: "secondary",
    text: item.image instanceof Blob ? "Change Photo" : "Add Photo"
  });
  const receiptBtn = createElement("button", {
    className: "secondary",
    text: item.receipt instanceof Blob ? "Change Receipt" : "Add Receipt"
  });
  const deleteBtn = createElement("button", { className: "danger", text: "Delete Item" });

  titleRow.append(title, diffLabel);
  priceLine.append(currentPrice, purchasePrice);

  overrideBtn.addEventListener("click", () => {
    void overridePrice(item.id);
  });
  barcodeBtn.addEventListener("click", () => {
    void attachItemBarcode(item.id);
  });
  photoBtn.addEventListener("click", () => {
    void updateItemFile(item.id, "image", "image/*");
  });
  receiptBtn.addEventListener("click", () => {
    void updateItemFile(item.id, "receipt", "application/pdf");
  });
  deleteBtn.addEventListener("click", () => {
    void deleteItem(item.id);
  });

  actions.append(overrideBtn, barcodeBtn, photoBtn, receiptBtn, deleteBtn);
  details.append(titleRow, meta);
  if (description) {
    details.appendChild(description);
  }
  details.append(priceLine, updated);

  if (item.image instanceof Blob) {
    const image = createElement("img", { className: "thumb" });
    image.alt = `${item.name} photo`;
    image.src = trackedObjectUrl(item.image);
    media.appendChild(image);
  } else if (item.imageUrl) {
    const image = createElement("img", { className: "thumb" });
    image.alt = `${item.name} product image`;
    image.src = item.imageUrl;
    media.appendChild(image);
  }

  if (item.receipt instanceof Blob) {
    const receipt = createElement("a", { text: "Open receipt" });
    receipt.href = trackedObjectUrl(item.receipt);
    receipt.target = "_blank";
    receipt.rel = "noopener noreferrer";
    media.appendChild(receipt);
  }

  layout.append(details, media);
  itemCard.append(layout, actions);
  return itemCard;
}

function pluralize(count, singular, plural = `${singular}s`) {
  return count === 1 ? singular : plural;
}

function sumItemValue(items) {
  return items.reduce((total, item) => {
    return Number.isFinite(item.currentPrice) ? total + item.currentPrice : total;
  }, 0);
}

function getCollectionItems(collection, items) {
  return items.filter(item => item.collectionId === collection.id);
}

function getRoomItems(roomCollections, items) {
  const collectionIds = new Set(roomCollections.map(collection => collection.id));
  return items.filter(item => collectionIds.has(item.collectionId));
}

function itemMatchesSearch(item, searchTerm) {
  if (!searchTerm) {
    return true;
  }

  const haystack = [
    item.name,
    item.barcode,
    item.brand,
    item.category,
    item.description
  ].filter(Boolean).join(" ").toLowerCase();

  return haystack.includes(searchTerm);
}

function collectionMatchesSearch(collection, collectionItems, searchTerm) {
  if (!searchTerm) {
    return true;
  }

  return collection.name.toLowerCase().includes(searchTerm)
    || collectionItems.some(item => itemMatchesSearch(item, searchTerm));
}

function roomMatchesSearch(room, roomCollections, roomItems, searchTerm) {
  if (!searchTerm) {
    return true;
  }

  return room.name.toLowerCase().includes(searchTerm)
    || roomCollections.some(collection => collection.name.toLowerCase().includes(searchTerm))
    || roomItems.some(item => itemMatchesSearch(item, searchTerm));
}

function createStat(text) {
  return createElement("span", { className: "pill", text });
}

function makeInteractiveTile(tile, callback) {
  tile.setAttribute("role", "button");
  tile.tabIndex = 0;
  tile.addEventListener("click", callback);
  tile.addEventListener("keydown", event => {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      callback();
    }
  });
}

function setView(roomId = null, collectionId = null) {
  currentRoomId = roomId;
  currentCollectionId = collectionId;
  document.getElementById("search").value = "";
  void render();
}

function createNavButton(text, callback) {
  const button = createElement("button", { className: "secondary", text });
  button.addEventListener("click", callback);
  return button;
}

function updateViewHeader(room, collection) {
  const eyebrow = document.getElementById("viewEyebrow");
  const title = document.getElementById("viewTitle");
  const nav = document.getElementById("viewNav");

  nav.innerHTML = "";

  if (collection && room) {
    eyebrow.textContent = `${room.name} / Collection`;
    title.textContent = collection.name;
    nav.append(
      createNavButton("Rooms", () => setView()),
      createNavButton(room.name, () => setView(room.id))
    );
    return;
  }

  if (room) {
    eyebrow.textContent = "Room";
    title.textContent = room.name;
    nav.appendChild(createNavButton("Rooms", () => setView()));
    return;
  }

  eyebrow.textContent = "Dashboard";
  title.textContent = "Rooms";
}

function updateToolbar(room, collection) {
  const search = document.getElementById("search");
  const scanButton = document.getElementById("scanBtn");
  const addItemButton = document.getElementById("addItemBtn");
  const homeButton = document.getElementById("homeBtn");
  const addRoomButton = document.getElementById("addRoomBtn");
  const addCollectionButton = document.getElementById("addCollectionBtn");

  scanButton.hidden = !collection;
  addItemButton.hidden = !collection;
  homeButton.hidden = !room && !collection;
  addRoomButton.hidden = !!room;
  addCollectionButton.hidden = !room || !!collection;

  if (collection) {
    search.placeholder = `Search ${collection.name} items...`;
  } else if (room) {
    search.placeholder = `Search ${room.name} collections...`;
  } else {
    search.placeholder = "Search rooms, collections, or items...";
  }
}

function buildRoomTile(room, roomCollections, roomItems) {
  const tile = createElement("article", { className: "tile" });
  const titleBlock = createElement("div");
  const title = createElement("h3", { className: "tile-title", text: room.name });
  const meta = createElement("p", {
    className: "muted",
    text: `${roomCollections.length} ${pluralize(roomCollections.length, "collection")}`
  });
  const stats = createElement("div", { className: "tile-stats" });
  const actions = createElement("div", { className: "tile-actions" });
  const deleteButton = createElement("button", { className: "danger", text: "Delete" });

  makeInteractiveTile(tile, () => setView(room.id));
  titleBlock.append(title, meta);
  stats.append(
    createStat(`${roomItems.length} ${pluralize(roomItems.length, "item")}`),
    createStat(`$${formatMoney(sumItemValue(roomItems))}`)
  );
  deleteButton.addEventListener("click", event => {
    event.stopPropagation();
    void deleteRoom(room.id);
  });
  actions.appendChild(deleteButton);

  tile.append(titleBlock, stats, actions);
  return tile;
}

function buildCollectionTile(collection, collectionItems) {
  const tile = createElement("article", { className: "tile" });
  const titleBlock = createElement("div");
  const title = createElement("h3", { className: "tile-title", text: collection.name });
  const meta = createElement("p", {
    className: "muted",
    text: `${collectionItems.length} ${pluralize(collectionItems.length, "item")}`
  });
  const stats = createElement("div", { className: "tile-stats" });
  const actions = createElement("div", { className: "tile-actions" });
  const deleteButton = createElement("button", { className: "danger", text: "Delete" });

  makeInteractiveTile(tile, () => setView(collection.roomId, collection.id));
  titleBlock.append(title, meta);
  stats.append(createStat(`$${formatMoney(sumItemValue(collectionItems))}`));
  deleteButton.addEventListener("click", event => {
    event.stopPropagation();
    void deleteCollection(collection.id);
  });
  actions.appendChild(deleteButton);

  tile.append(titleBlock, stats, actions);
  return tile;
}

function buildDashboardView(container, rooms, collections, items, searchTerm) {
  const grid = createElement("div", { className: "tile-grid" });
  const visibleRooms = rooms.filter(room => {
    const roomCollections = collections.filter(collection => collection.roomId === room.id);
    const roomItems = getRoomItems(roomCollections, items);
    return roomMatchesSearch(room, roomCollections, roomItems, searchTerm);
  });

  if (visibleRooms.length === 0) {
    container.appendChild(createElement("div", {
      className: "empty-state",
      text: searchTerm ? "No rooms match the current search." : "No rooms yet."
    }));
    return;
  }

  visibleRooms.forEach(room => {
    const roomCollections = collections.filter(collection => collection.roomId === room.id);
    const roomItems = getRoomItems(roomCollections, items);
    grid.appendChild(buildRoomTile(room, roomCollections, roomItems));
  });

  container.appendChild(grid);
}

function buildRoomView(container, room, collections, items, searchTerm) {
  const roomCollections = collections.filter(collection => collection.roomId === room.id);
  const visibleCollections = roomCollections.filter(collection => {
    const collectionItems = getCollectionItems(collection, items);
    return collectionMatchesSearch(collection, collectionItems, searchTerm);
  });
  const grid = createElement("div", { className: "tile-grid" });

  if (visibleCollections.length === 0) {
    container.appendChild(createElement("div", {
      className: "empty-state",
      text: searchTerm ? "No collections match the current search." : "No collections yet."
    }));
    return;
  }

  visibleCollections.forEach(collection => {
    grid.appendChild(buildCollectionTile(collection, getCollectionItems(collection, items)));
  });

  container.appendChild(grid);
}

function buildCollectionView(container, collection, items, searchTerm) {
  const collectionItems = getCollectionItems(collection, items)
    .filter(item => itemMatchesSearch(item, searchTerm));

  if (collectionItems.length === 0) {
    container.appendChild(createElement("div", {
      className: "empty-state",
      text: searchTerm ? "No items match the current search." : "No items yet."
    }));
    return;
  }

  collectionItems.forEach(item => {
    container.appendChild(buildItemCard(item));
  });
}

async function render() {
  cleanupObjectUrls();

  const [rooms, collections, items] = await Promise.all([
    getAllRecords(STORE_ROOMS),
    getAllRecords(STORE_COLLECTIONS),
    getAllRecords(STORE_ITEMS)
  ]);

  const container = document.getElementById("collections");
  const searchTerm = document.getElementById("search").value.trim().toLowerCase();
  let room = currentRoomId ? rooms.find(entry => entry.id === currentRoomId) : null;
  let collection = currentCollectionId ? collections.find(entry => entry.id === currentCollectionId) : null;

  if (currentRoomId && !room) {
    currentRoomId = null;
    currentCollectionId = null;
    room = null;
    collection = null;
  }

  if (collection && (!room || collection.roomId !== room.id)) {
    room = rooms.find(entry => entry.id === collection.roomId) || null;
    currentRoomId = room ? room.id : null;
  }

  if (currentCollectionId && (!collection || !room)) {
    currentCollectionId = null;
    collection = null;
  }

  container.innerHTML = "";
  document.getElementById("totalValue").textContent = formatMoney(sumItemValue(items));
  document.getElementById("roomCount").textContent = rooms.length;
  document.getElementById("collectionCount").textContent = collections.length;
  document.getElementById("itemCount").textContent = items.length;

  updateViewHeader(room, collection);
  updateToolbar(room, collection);

  if (collection) {
    buildCollectionView(container, collection, items, searchTerm);
  } else if (room) {
    buildRoomView(container, room, collections, items, searchTerm);
  } else {
    buildDashboardView(container, rooms, collections, items, searchTerm);
  }
}

async function addRoom() {
  if (!db) {
    try {
      await openDB();
    } catch (err) {
      console.error("Failed opening DB:", err);
      alert("Unable to access storage. Try reloading the app.");
      return;
    }
  }

  const name = prompt("Room name?");
  if (name === null) {
    return;
  }

  const trimmed = name.trim();
  if (!trimmed) {
    alert("Room name cannot be empty.");
    return;
  }

  try {
    await addRecord(STORE_ROOMS, { name: trimmed, created: Date.now() });
    await render();
  } catch (err) {
    console.error("Failed to add room:", err);
    alert("Could not save the room. Check the browser console for details.");
  }
}

async function chooseRoomId() {
  const rooms = await getAllRecords(STORE_ROOMS);
  if (rooms.length === 0) {
    alert("Create a room first.");
    return null;
  }

  if (rooms.length === 1) {
    return rooms[0].id;
  }

  const promptText = rooms.map((room, index) => `${index + 1}. ${room.name}`).join("\n");
  const selection = prompt(`Choose a room for this collection:\n${promptText}`);
  if (selection === null) {
    return null;
  }

  const trimmed = selection.trim();
  const numeric = Number(trimmed);
  if (Number.isFinite(numeric) && numeric >= 1 && numeric <= rooms.length) {
    return rooms[numeric - 1].id;
  }

  const matchedRoom = rooms.find(room => room.name.toLowerCase() === trimmed.toLowerCase());
  if (matchedRoom) {
    return matchedRoom.id;
  }

  alert("Could not match the selected room.");
  return null;
}

async function addCollection(roomId) {
  if (!roomId) {
    roomId = await chooseRoomId();
    if (roomId === null) {
      return;
    }
  }

  const name = prompt("Collection name?");
  if (name === null) {
    return;
  }

  const trimmed = name.trim();
  if (!trimmed) {
    alert("Collection name cannot be empty.");
    return;
  }

  await addRecord(STORE_COLLECTIONS, { name: trimmed, roomId, created: Date.now() });
  await render();
}

async function addItem(collectionId) {
  if (isAddingItem) {
    alert("Finish the current item before adding another.");
    return;
  }

  isAddingItem = true;

  try {
    const name = prompt("Item name?");
    if (name === null) {
      return;
    }

    const trimmedName = name.trim();
    if (!trimmedName) {
      alert("Item name cannot be empty.");
      return;
    }

    let purchaseInput = parsePriceInput("Purchase price? Leave blank if unknown.");
    while (purchaseInput.value === undefined) {
      purchaseInput = parsePriceInput("Purchase price? Leave blank if unknown.");
    }
    if (purchaseInput.cancelled) {
      return;
    }

    try {
      await addRecord(STORE_ITEMS, {
        name: trimmedName,
        barcode: "",
        brand: "",
        category: "",
        description: "",
        image: null,
        imageUrl: "",
        receipt: null,
        purchasePrice: purchaseInput.value,
        estimatedPrice: null,
        currentPrice: purchaseInput.value,
        updated: Date.now(),
        collectionId
      });
    } catch (err) {
      console.error("Failed to add item:", err);
      alert("Could not save the item. Check the browser console for details.");
      return;
    }

    await render();
  } finally {
    isAddingItem = false;
  }
}

async function addScannedItem(collectionId) {
  if (isAddingItem) {
    alert("Finish the current item before adding another.");
    return;
  }

  isAddingItem = true;

  try {
    const barcode = await scanBarcode();
    if (!barcode || typeof barcode !== "string") {
      return;
    }

    const details = await fetchBarcodeDetails(barcode);

    try {
      await addRecord(STORE_ITEMS, {
        name: details.name,
        barcode,
        brand: details.brand,
        category: details.category,
        description: details.description,
        image: null,
        imageUrl: details.imageUrl,
        receipt: null,
        purchasePrice: details.price,
        estimatedPrice: details.price,
        currentPrice: details.price,
        updated: Date.now(),
        collectionId
      });
    } catch (err) {
      console.error("Failed to add scanned item:", err);
      alert("Could not save the scanned item. Check the browser console for details.");
      return;
    }

    await render();

    if (!details.found) {
      alert("The item was saved with its barcode, but no product details were found.");
    } else if (details.price === null) {
      alert("The item was saved, but no price was found for this barcode.");
    }
  } catch (err) {
    console.error("Failed to scan item:", err);
    alert("Could not scan the item.");
  } finally {
    isAddingItem = false;
  }
}

async function deleteItem(id) {
  const confirmed = confirm("Delete this item?");
  if (!confirmed) {
    return;
  }

  await deleteRecord(STORE_ITEMS, id);
  await render();
}

async function overridePrice(id) {
  const items = await getAllRecords(STORE_ITEMS);
  const item = items.find(entry => entry.id === id);
  if (!item) {
    return;
  }

  let input = parsePriceInput("New price?");
  while (input.value === undefined) {
    input = parsePriceInput("New price?");
  }
  if (input.cancelled || input.value === null) {
    return;
  }

  item.currentPrice = input.value;
  item.updated = Date.now();

  await putRecord(STORE_ITEMS, item);
  await render();
}

async function updateItemFile(id, field, type) {
  const file = await pickFile(type);
  if (!file) {
    return;
  }

  const item = await getRecord(STORE_ITEMS, id);
  if (!item) {
    return;
  }

  item[field] = file;
  item.updated = Date.now();

  try {
    await putRecord(STORE_ITEMS, item);
    await render();
  } catch (err) {
    console.error("Failed to update item file:", err);
    alert("Could not attach the file. Check the browser console for details.");
  }
}

async function attachItemBarcode(id) {
  try {
    const barcode = await scanBarcode();
    if (barcode && typeof barcode === "string") {
      await updateItemBarcode(id, barcode);
    }
  } catch (err) {
    console.error("Failed to scan barcode:", err);
    alert("Could not scan or attach the barcode.");
  }
}

async function updateItemBarcode(id, barcode) {
  try {
    const item = await getRecord(STORE_ITEMS, id);
    if (!item) {
      return;
    }

    const details = await fetchBarcodeDetails(barcode);

    item.barcode = barcode;
    item.brand = item.brand || details.brand;
    item.category = item.category || details.category;
    item.description = item.description || details.description;
    if (!item.imageUrl && !(item.image instanceof Blob)) {
      item.imageUrl = details.imageUrl;
    }
    if (!Number.isFinite(item.purchasePrice)) {
      item.purchasePrice = details.price;
    }
    if (!Number.isFinite(item.currentPrice)) {
      item.currentPrice = details.price;
    }
    item.estimatedPrice = details.price;
    item.updated = Date.now();

    await putRecord(STORE_ITEMS, item);
    await render();
  } catch (err) {
    console.error("Failed to update item barcode:", err);
    alert("The item was saved, but the barcode could not be attached.");
  }
}

async function refreshItemPrice(id) {
  try {
    const item = await getRecord(STORE_ITEMS, id);
    if (!item || !item.barcode) {
      return;
    }

    const newPrice = await fetchPrice(item.barcode);
    if (newPrice === null) {
      return;
    }

    item.currentPrice = Number.isFinite(item.currentPrice) ? item.currentPrice : newPrice;
    item.estimatedPrice = newPrice;
    item.updated = Date.now();

    await putRecord(STORE_ITEMS, item);
    await render();
  } catch (err) {
    console.error("Failed to refresh item price:", err);
  }
}

async function updatePrice(id) {
  const items = await getAllRecords(STORE_ITEMS);
  const item = items.find(entry => entry.id === id);
  if (!item) {
    return;
  }

  if (!item.barcode) {
    alert("This item does not have a barcode to look up.");
    return;
  }

  const newPrice = await fetchPrice(item.barcode);
  if (newPrice === null) {
    alert("Could not fetch a live price right now.");
    return;
  }

  item.currentPrice = newPrice;
  item.estimatedPrice = newPrice;
  item.updated = Date.now();

  await putRecord(STORE_ITEMS, item);
  await render();
}

function pickFile(type) {
  return new Promise(resolve => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = type;
    input.style.position = "fixed";
    input.style.left = "-9999px";
    document.body.appendChild(input);

    let settled = false;
    const finalize = value => {
      if (!settled) {
        settled = true;
        input.remove();
        resolve(value);
      }
    };

    input.addEventListener("change", () => {
      finalize(input.files && input.files[0] ? input.files[0] : null);
    }, { once: true });

    input.addEventListener("cancel", () => {
      finalize(null);
    }, { once: true });

    window.addEventListener("focus", () => {
      setTimeout(() => {
        if (!settled) {
          finalize(input.files && input.files[0] ? input.files[0] : null);
        }
      }, 300);
    }, { once: true });

    input.click();
  });
}

async function manualBarcodeEntry(message) {
  const value = prompt(message);
  if (value === null) {
    return undefined;
  }

  const trimmed = value.trim();
  if (!trimmed) {
    return null; // User skipped or left empty
  }
  return trimmed;
}

async function deleteCollection(id) {
  const confirmed = confirm("Delete this collection and all its items?");
  if (!confirmed) {
    return;
  }

  const items = await getAllRecords(STORE_ITEMS);
  const collectionItems = items.filter(item => item.collectionId === id);

  for (const item of collectionItems) {
    await deleteRecord(STORE_ITEMS, item.id);
  }

  await deleteRecord(STORE_COLLECTIONS, id);
  if (currentCollectionId === id) {
    currentCollectionId = null;
  }
  await render();
}

async function deleteRoom(id) {
  const confirmed = confirm("Delete this room and everything inside it?");
  if (!confirmed) {
    return;
  }

  const collections = await getAllRecords(STORE_COLLECTIONS);
  const roomCollections = collections.filter(collection => collection.roomId === id);
  const items = await getAllRecords(STORE_ITEMS);

  for (const collection of roomCollections) {
    const collectionItems = items.filter(item => item.collectionId === collection.id);
    for (const item of collectionItems) {
      await deleteRecord(STORE_ITEMS, item.id);
    }
    await deleteRecord(STORE_COLLECTIONS, collection.id);
  }

  await deleteRecord(STORE_ROOMS, id);
  if (currentRoomId === id) {
    currentRoomId = null;
    currentCollectionId = null;
  }
  await render();
}

async function chooseCollectionId() {
  const collections = await getAllRecords(STORE_COLLECTIONS);
  if (collections.length === 0) {
    alert("Create a collection first.");
    return null;
  }

  if (collections.length === 1) {
    return collections[0].id;
  }

  const rooms = await getAllRecords(STORE_ROOMS);
  const roomById = new Map(rooms.map(room => [room.id, room.name]));
  const promptText = collections
    .map((collection, index) => {
      const roomName = roomById.get(collection.roomId) || "Unknown room";
      return `${index + 1}. ${collection.name} (${roomName})`;
    })
    .join("\n");

  const selection = prompt(`Choose a collection for this item:\n${promptText}`);
  if (selection === null) {
    return null;
  }

  const trimmed = selection.trim();
  const numeric = Number(trimmed);
  if (Number.isFinite(numeric) && numeric >= 1 && numeric <= collections.length) {
    return collections[numeric - 1].id;
  }

  const matchedCollection = collections.find(collection => collection.name.toLowerCase() === trimmed.toLowerCase());
  if (matchedCollection) {
    return matchedCollection.id;
  }

  alert("Could not match the selected collection.");
  return null;
}

async function scanBarcode() {
  if (!window.ZXingBrowser || !navigator.mediaDevices) {
    return manualBarcodeEntry("Camera scanning is unavailable. Enter barcode manually (or leave empty to skip):");
  }

  return new Promise(async resolve => {
    const codeReader = new ZXingBrowser.BrowserMultiFormatReader();
    const overlay = createElement("div", { className: "scanner-overlay" });
    const panel = createElement("div", { className: "scanner-panel" });
    const label = createElement("p", {
      className: "muted",
      text: "Point the camera at a barcode, or cancel to type it manually."
    });
    const videoWrap = createElement("div", { className: "scanner-video" });
    const video = document.createElement("video");
    const cancelButton = createElement("button", { className: "secondary", text: "Cancel" });
    const skipButton = createElement("button", { className: "secondary", text: "Skip" });

    videoWrap.appendChild(video);
    panel.append(label, videoWrap, cancelButton, skipButton);
    overlay.appendChild(panel);
    document.body.appendChild(overlay);

    let controls = null;
    let settled = false;

    const finish = async value => {
      if (settled) {
        return;
      }

      settled = true;
      controls?.stop();
      overlay.remove();
      resolve(value);
    };

    cancelButton.addEventListener("click", async () => {
      const manual = await manualBarcodeEntry("Enter barcode manually (or leave empty to skip):");
      await finish(manual);
    });

    skipButton.addEventListener("click", async () => {
      await finish(null); // Skip barcode entry
    });

    try {
      controls = await codeReader.decodeFromVideoDevice(null, video, async result => {
        if (result) {
          await finish(result.getText());
        }
      });
    } catch {
      const manual = await manualBarcodeEntry("Camera failed. Enter barcode manually (or leave empty to skip):");
      await finish(manual);
    }
  });
}

function cleanLookupText(value) {
  return typeof value === "string" ? value.trim() : "";
}

function limitLookupText(value, maxLength = 180) {
  const text = cleanLookupText(value);
  if (text.length <= maxLength) {
    return text;
  }

  return `${text.slice(0, maxLength - 3).trim()}...`;
}

function parseLookupPrice(value) {
  if (typeof value === "number" && Number.isFinite(value) && value >= 0) {
    return value;
  }

  if (typeof value !== "string") {
    return null;
  }

  const match = value.replace(/,/g, "").match(/\d+(?:\.\d+)?/);
  if (!match) {
    return null;
  }

  const price = Number(match[0]);
  return Number.isFinite(price) && price >= 0 ? price : null;
}

function extractLookupPrice(item) {
  if (!item) {
    return null;
  }

  const directPrice = parseLookupPrice(item.lowest_recorded_price);
  if (directPrice !== null) {
    return directPrice;
  }

  if (Array.isArray(item.offers)) {
    const offerPrices = item.offers
      .map(offer => parseLookupPrice(offer.price))
      .filter(price => price !== null);

    if (offerPrices.length > 0) {
      return Math.min(...offerPrices);
    }
  }

  return null;
}

async function fetchBarcodeLookup(barcode) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), PRICE_LOOKUP_TIMEOUT_MS);

  try {
    const response = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${encodeURIComponent(barcode)}`, {
      signal: controller.signal
    });

    if (!response.ok) {
      return null;
    }

    const data = await response.json();
    return data.items?.[0] || null;
  } catch {
    return null;
  } finally {
    clearTimeout(timeout);
  }
}

async function fetchBarcodeDetails(barcode) {
  const item = await fetchBarcodeLookup(barcode);
  if (!item) {
    return {
      found: false,
      name: `Scanned item ${barcode}`,
      brand: "",
      category: "",
      description: "",
      imageUrl: "",
      price: FALLBACK_PRICE
    };
  }

  const title = cleanLookupText(item.title);
  const brand = cleanLookupText(item.brand);
  const category = cleanLookupText(item.category);
  const description = limitLookupText(item.description);
  const images = Array.isArray(item.images) ? item.images : [];
  const imageUrl = images.find(url => cleanLookupText(url)) || "";
  const price = extractLookupPrice(item);

  return {
    found: true,
    name: title || [brand, category].filter(Boolean).join(" ") || `Scanned item ${barcode}`,
    brand,
    category,
    description: description === title ? "" : description,
    imageUrl,
    price
  };
}

async function fetchPrice(barcode) {
  const item = await fetchBarcodeLookup(barcode);
  return extractLookupPrice(item);
}

window.addEventListener("beforeinstallprompt", event => {
  event.preventDefault();
  deferredPrompt = event;
  document.getElementById("installBtn").hidden = false;
});

document.getElementById("installBtn").addEventListener("click", async () => {
  if (!deferredPrompt) {
    return;
  }

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById("installBtn").hidden = true;
});

document.getElementById("search").addEventListener("input", () => {
  void render();
});
document.getElementById("addRoomBtn").addEventListener("click", () => {
  void addRoom();
});
document.getElementById("addCollectionBtn").addEventListener("click", async () => {
  const roomId = currentRoomId || await chooseRoomId();
  if (roomId !== null) {
    void addCollection(roomId);
  }
});
document.getElementById("scanBtn").addEventListener("click", async () => {
  const collectionId = currentCollectionId || await chooseCollectionId();
  if (collectionId !== null) {
    void addScannedItem(collectionId);
  }
});
document.getElementById("addItemBtn").addEventListener("click", async () => {
  const collectionId = currentCollectionId || await chooseCollectionId();
  if (collectionId !== null) {
    void addItem(collectionId);
  }
});
document.getElementById("homeBtn").addEventListener("click", () => {
  setView();
});
