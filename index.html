<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Manager PWA</title>
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/@zxing/browser@latest"></script>
<style>
:root {
  color-scheme: dark;
  --bg: #0b1220;
  --panel: #162033;
  --panel-2: #1d2940;
  --text: #e5edf7;
  --muted: #9fb0c8;
  --accent: #3fb68b;
  --accent-2: #2d8f6c;
  --danger: #ef6b73;
  --border: rgba(159, 176, 200, 0.18);
  --shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  background:
    radial-gradient(circle at top, rgba(63, 182, 139, 0.18), transparent 35%),
    linear-gradient(180deg, #0c1424 0%, #0b1220 100%);
  color: var(--text);
}

header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  background: rgba(11, 18, 32, 0.88);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}

h1,
h2,
h3,
h4,
p {
  margin: 0;
}

h1 {
  font-size: 1.2rem;
}

button,
input {
  font: inherit;
}

button {
  border: 0;
  border-radius: 999px;
  background: var(--accent);
  color: #082015;
  cursor: pointer;
  padding: 0.65rem 1rem;
  font-weight: 700;
  transition: transform 120ms ease, background 120ms ease;
}

button:focus-visible {
  outline: 2px solid rgba(63, 182, 139, 0.9);
  outline-offset: 3px;
}


button:hover {
  background: #56c89e;
  transform: translateY(-1px);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.5;
  transform: none;
}

button.secondary {
  background: var(--panel-2);
  color: var(--text);
  border: 1px solid var(--border);
}

button.danger {
  background: rgba(239, 107, 115, 0.14);
  color: #ffd7da;
  border: 1px solid rgba(239, 107, 115, 0.25);
}

.app-shell {
  width: min(1100px, calc(100% - 2rem));
  margin: 1.5rem auto 2rem;
}

.summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem;
  margin-bottom: 1rem;
}

.panel,
.card,
.item-card,
.tile {
  background: linear-gradient(180deg, rgba(29, 41, 64, 0.92), rgba(22, 32, 51, 0.96));
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.panel {
  padding: 1rem;
}

.summary-value {
  font-size: 1.9rem;
  font-weight: 800;
  margin-top: 0.25rem;
}

.muted {
  color: var(--muted);
}

.toolbar {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 0.75rem;
  margin-bottom: 1rem;
}

input {
  width: 100%;
  padding: 0.9rem 1rem;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: rgba(10, 17, 29, 0.85);
  color: var(--text);
}

.view-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
  padding: 0.9rem 1rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(10, 17, 29, 0.55);
}

.view-title {
  font-size: 1.05rem;
}

.content {
  display: grid;
  gap: 1rem;
}

.card {
  padding: 1rem;
}

.tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0.85rem;
}

.tile {
  min-height: 150px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 1rem;
  padding: 1rem;
  color: var(--text);
  outline: none;
  transition: border-color 120ms ease, transform 120ms ease, background 120ms ease;
}

a.tile[role="button"] {
  cursor: pointer;
}

.tile[role="button"]:hover,
.tile[role="button"]:focus-visible {
  border-color: rgba(63, 182, 139, 0.62);
  transform: translateY(-1px);
}

.tile-title {
  font-size: 1.05rem;
}

.tile-stats,
.tile-actions {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  align-items: center;
}

.tile-actions {
  justify-content: flex-end;
}

.card-header,
.item-header,
.action-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.item-card {
  padding: 1rem;
}

.item-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 1rem;
}

.price-line {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-top: 0.6rem;
}

.pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 0.24rem 0.55rem;
  background: rgba(63, 182, 139, 0.12);
  color: #baf0d9;
  font-size: 0.82rem;
  font-weight: 700;
}

.pill.loss {
  background: rgba(239, 107, 115, 0.14);
  color: #ffd7da;
}

.thumb {
  width: 110px;
  aspect-ratio: 1 / 1;
  border-radius: 16px;
  object-fit: cover;
  border: 1px solid var(--border);
  background: #0b1220;
}

.empty-state {
  padding: 1.5rem;
  text-align: center;
  color: var(--muted);
  border: 1px dashed var(--border);
  border-radius: 18px;
}

.scanner-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.9);
  padding: 1rem;
}

.scanner-panel {
  width: min(560px, 100%);
  display: grid;
  gap: 0.75rem;
}

.scanner-video {
  width: 100%;
  border-radius: 20px;
  overflow: hidden;
  background: #000;
}

.scanner-video video {
  width: 100%;
  display: block;
}

.scanner-spinner {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.12);
  border-top-color: var(--accent);
  animation: scanner-spin 900ms linear infinite;
  margin: 0 auto;
}
@keyframes scanner-spin {
  to { transform: rotate(360deg); }
}

.scanner-frame {
  position: absolute;
  left: 50%;
  top: 50%;
  width: min(420px, 86%);
  height: min(300px, 60%);
  transform: translate(-50%, -50%);
  border: 3px solid rgba(63, 182, 139, 0.95);
  border-radius: 16px;
  box-shadow: 0 0 40px rgba(63, 182, 139, 0.18), inset 0 0 24px rgba(0, 0, 0, 0.35);
  pointer-events: none;
  display: none;
}

.scanner-frame::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 16px;
  box-shadow: inset 0 0 0 1px rgba(63, 182, 139, 0.25);
  pointer-events: none;
}

.scan-line {
  position: absolute;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, rgba(63, 182, 139, 0) 0%, rgba(63, 182, 139, 0.95) 50%, rgba(63, 182, 139, 0) 100%);
  transform: translateY(-100%);
  opacity: 0;
}

.scan-line.running {
  animation: scan-slide 1.5s linear infinite;
}

@keyframes scan-slide {
  0% { transform: translateY(-10%); opacity: 0; }
  10% { opacity: 1; }
  50% { transform: translateY(100%); opacity: 1; }
  90% { opacity: 0; }
  100% { transform: translateY(110%); opacity: 0; }
}

.scanner-toast {
  position: fixed;
  left: 50%;
  bottom: 6%;
  transform: translateX(-50%);
  background: rgba(14, 28, 22, 0.96);
  color: #dff6ea;
  border: 1px solid rgba(63, 182, 139, 0.24);
  padding: 0.7rem 1.1rem;
  border-radius: 999px;
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
  font-weight: 700;
  opacity: 0;
  transition: opacity 160ms ease, transform 160ms ease;
  pointer-events: none;
  z-index: 10000;
}
.scanner-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.access-denied {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 2rem;
  text-align: center;
}

/* Auth overlay (glassmorphism) */
.auth-overlay {
  position: fixed;
  inset: 0;
  z-index: 20000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  background: rgba(0, 0, 0, 0.55);
}

.auth-overlay.show {
  display: flex;
}

.auth-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  backdrop-filter: blur(10px);
}

.auth-modal {
  position: relative;
  width: min(560px, 100%);
  border-radius: 22px;
  border: 1px solid rgba(63, 182, 139, 0.25);
  background: rgba(18, 30, 48, 0.55);
  backdrop-filter: blur(18px);
  box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
  padding: 1.25rem 1.25rem 1.1rem;
}

.auth-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.auth-header h2 {
  font-size: 1.2rem;
}

.auth-fields input {
  width: 100%;
}

.auth-actions button.secondary {
  background: rgba(29, 41, 64, 0.9);
}

#authStatus {
  color: var(--muted);
}

a {
  color: #93d6bb;
}


@media (max-width: 720px) {
  .toolbar,
  .item-grid,
  .view-bar {
    grid-template-columns: 1fr;
  }

  .view-bar {
    align-items: flex-start;
    flex-direction: column;
  }

  header {
    align-items: flex-start;
  }
}
</style>
</head>
<body>
<header>
  <div>
    <h1>Inventory Manager</h1>
    <p class="muted">Track items and prices by room offline.</p>
  </div>
  <div class="action-row">
    <button id="installBtn" class="secondary" hidden>Install App</button>
    <div id="authControls" class="action-row" style="gap:0.5rem; margin-left:0.75rem; align-items: center;">
      <button id="openAuthOverlayBtn" class="secondary">Log in</button>
      <button id="signOutBtn" class="secondary" hidden>Sign out</button>
    </div>
  </div>
</header>

<!-- Auth overlay (glassmorphism) -->
<div id="authOverlay" class="auth-overlay" aria-hidden="true" role="dialog" aria-modal="true">
  <div class="auth-modal">
    <div class="auth-header">
      <h2>Welcome</h2>
      <button id="closeAuthOverlayBtn" class="secondary" style="padding:0.4rem 0.75rem;">Cancel</button>
    </div>

    <p class="muted" style="margin-top:-0.25rem;">Sign in to unlock online features.</p>

    <div class="auth-fields" style="margin-top:1rem; display:grid; gap:0.75rem;">
      <input id="emailInput" type="email" placeholder="Email" autocomplete="email" />
      <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password" />
    </div>

    <div class="auth-actions" style="display:flex; gap:0.75rem; margin-top:1rem; flex-wrap:wrap;">
      <button id="loginBtn" class="secondary" style="flex:1; min-width:170px;">Log in</button>
      <button id="signupBtn" class="secondary" style="flex:1; min-width:170px;">Sign up</button>
    </div>

    <p id="authStatus" class="muted" style="min-height:1.2em; margin-top:0.75rem; font-size:0.92rem;"></p>
  </div>
</div>


<!-- Supabase runtime config for plain static hosting -->
<script src="./supabase-runtime-config.js"></script>

<main class="app-shell">
  <section class="summary">
    <div class="panel">
      <p class="muted">Total Value</p>
      <div class="summary-value">$<span id="totalValue">0.00</span></div>

      <button id="addItemBtn" class="secondary">Add Item</button>
      <button id="homeBtn" class="secondary" hidden>Home</button>

  </section>

  <section class="view-bar">
    <div>
      <p id="viewEyebrow" class="muted" style="display:none;">Dashboard</p>
      <h2 id="viewTitle" class="view-title">Rooms</h2>
    </div>
    <div id="viewNav" class="action-row"></div>
  </section>


  <section id="collections" class="content" aria-live="polite"></section>
</main>

<script type="module">
import { initAuth, getSession, signInWithPassword, signUpWithPassword, signOut, onAuthStateChange } from './supabase-auth.js';
import { supabaseClient } from './supabase-client.js';

import { storage, setSupabaseClient } from './supabase-storage.js';

function showFatalError(message) {
  const el = document.createElement('div');
  el.className = 'access-denied';
  el.innerHTML = `
    <div style="max-width:720px;">
      <h2 style="margin-bottom:0.75rem;">App failed to start</h2>
      <p style="color:var(--muted); margin-bottom:1rem;">${message}</p>
      <p style="color:var(--muted); font-size:12px;">(You can still use the browser console to troubleshoot.)</p>
      <button style="margin-top:1rem;" onclick="location.reload()">Reload</button>
    </div>
  `;
  document.body.appendChild(el);
}

// Initialize auth + bind storage to authenticated client.
let session = null;
try {
  if (supabaseClient) {
    setSupabaseClient(supabaseClient);
    await initAuth();
    session = getSession();
    onAuthStateChange(s => { session = s; setAuthUI(!!session && !!session.user); });
  } else {
    console.warn('[startup] Supabase client is not initialized; running offline-only mode.');
  }
} catch (e) {
  console.error('[startup] Supabase/auth init failed:', e);
  setAuthUI(false);
}


try {
  const params = new URLSearchParams(window.location.search);
  console.log('[auth-debug] location.href =', window.location.href);
  console.log('[auth-debug] search params =', Object.fromEntries(params.entries()));
  const debug = document.createElement('pre');
  debug.style.cssText = 'position:fixed;left:12px;bottom:12px;max-width:520px;max-height:38vh;overflow:auto;z-index:99999;background:rgba(0,0,0,.6);border:1px solid rgba(63,182,139,.35);padding:10px;border-radius:10px;color:#dff6ea;font-size:12px;';
  const s = getSession();
  debug.textContent = [
    'Supabase auth-debug',
    'href: ' + window.location.href,
    'params: ' + JSON.stringify(Object.fromEntries(params.entries())),
    'session user: ' + (s?.user?.email || '(none)'),
    'session expires_at: ' + (s?.expires_at || '(none)'),
  ].join('\n');
  document.body.appendChild(debug);
} catch (e) {
  console.warn('[auth-debug] failed to render debug panel', e);
}

// Safety re-check after initAuth.
try {
  if (supabaseClient) {
    const { data } = await supabaseClient.auth.getSession();
    session = data.session || null;
    setAuthUI(!!session && !!session.user);
    console.log('[auth-debug] getSession after initAuth =>', { user: session?.user?.email, hasSession: !!session });
  }
} catch (e) {
  console.warn('[auth-debug] getSession after initAuth failed', e);
}

const DB_NAME = "inventoryDB";
const DB_VERSION = 4;
const STORE_ROOMS = "rooms";
const STORE_COLLECTIONS = "collections";
const STORE_ITEMS = "items";
const STORE_AUTH = "auth";
const FALLBACK_PRICE = null;
const PRICE_LOOKUP_TIMEOUT_MS = 8000;

let db;
let deferredPrompt = null;
let isAddingItem = false;
let currentRoomId = null;
let currentCollectionId = null;
const activeObjectUrls = new Set();

function requestToPromise(request) {
  return new Promise((resolve, reject) => {
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error("IndexedDB request failed"));
  });
}

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);

    request.onupgradeneeded = event => {
      const nextDb = event.target.result;

      if (!nextDb.objectStoreNames.contains(STORE_ROOMS)) {
        nextDb.createObjectStore(STORE_ROOMS, { keyPath: "id", autoIncrement: true });
      }

      if (!nextDb.objectStoreNames.contains(STORE_COLLECTIONS)) {
        const collectionStore = nextDb.createObjectStore(STORE_COLLECTIONS, { keyPath: "id", autoIncrement: true });
        collectionStore.createIndex("roomId", "roomId", { unique: false });
      }

      if (!nextDb.objectStoreNames.contains(STORE_ITEMS)) {
        const itemStore = nextDb.createObjectStore(STORE_ITEMS, { keyPath: "id", autoIncrement: true });
        itemStore.createIndex("collectionId", "collectionId", { unique: false });
      }

      if (!nextDb.objectStoreNames.contains(STORE_AUTH)) {
        nextDb.createObjectStore(STORE_AUTH, { keyPath: "key" });
      }
    };

    request.onsuccess = event => {
      db = event.target.result;
      resolve(db);
    };

    request.onerror = () => reject(request.error || new Error("Failed to open database"));
  });
}

function store(name, mode = "readonly") {
  return db.transaction(name, mode).objectStore(name);
}

function addRecord(name, value) {
  return requestToPromise(store(name, "readwrite").add(value));
}

function putRecord(name, value) {
  return requestToPromise(store(name, "readwrite").put(value));
}

function deleteRecord(name, key) {
  return requestToPromise(store(name, "readwrite").delete(key));
}

function getAllRecords(name) {
  return requestToPromise(store(name).getAll());
}

function getRecord(name, key) {
  return requestToPromise(store(name).get(key));
}

function createElement(tag, options = {}) {
  const element = document.createElement(tag);

  if (options.className) {
    element.className = options.className;
  }

  if (options.text !== undefined) {
    element.textContent = options.text;
  }

  return element;
}

function formatMoney(value) {
  const amount = Number.isFinite(value) ? value : 0;
  return amount.toFixed(2);
}

function parsePriceInput(message) {
  const raw = prompt(message);
  if (raw === null) {
    return { cancelled: true, value: null };
  }

  const trimmed = raw.trim();
  if (!trimmed) {
    return { cancelled: false, value: null };
  }

  const number = Number(trimmed);
  if (!Number.isFinite(number) || number < 0) {
    alert("Please enter a valid non-negative number.");
    return { cancelled: false, value: undefined };
  }

  return { cancelled: false, value: number };
}

function cleanupObjectUrls() {
  for (const url of activeObjectUrls) {
    URL.revokeObjectURL(url);
  }
  activeObjectUrls.clear();
}

function trackedObjectUrl(file) {
  const url = URL.createObjectURL(file);
  activeObjectUrls.add(url);
  return url;
}

function showToast(text, duration = 1300) {
  let toast = document.querySelector(".scanner-toast");

  if (!toast) {
    toast = document.createElement("div");
    toast.className = "scanner-toast";
    document.body.appendChild(toast);
  }

  toast.textContent = text;
  toast.classList.add("show");

  clearTimeout(toast._hideTimer);
  toast._hideTimer = setTimeout(() => {
    toast.classList.remove("show");
  }, duration);
}

function buildItemCard(item) {
  const itemCard = createElement("article", { className: "item-card" });
  const layout = createElement("div", { className: "item-grid" });
  const details = createElement("div");
  const media = createElement("div");
  const titleRow = createElement("div", { className: "item-header" });
  const title = createElement("h4", { text: item.name });

  const diffValue = Number.isFinite(item.purchasePrice) && Number.isFinite(item.currentPrice)
    ? item.currentPrice - item.purchasePrice
    : null;
  const diffLabel = createElement("span", {
    className: diffValue !== null && diffValue < 0 ? "pill loss" : "pill",
    text: diffValue === null ? "No comparison" : `${diffValue >= 0 ? "+" : "-"}$${Math.abs(diffValue).toFixed(2)}`
  });

  const metaText = [
    item.barcode ? `Barcode: ${item.barcode}` : "No barcode saved",
    item.brand ? `Brand: ${item.brand}` : "",
    item.category ? `Category: ${item.category}` : ""
  ].filter(Boolean).join(" | ");

  const meta = createElement("p", { className: "muted", text: metaText });
  const description = item.description
    ? createElement("p", { className: "muted", text: item.description })
    : null;

  const priceLine = createElement("div", { className: "price-line" });
  const currentPrice = createElement("span", {
    text: Number.isFinite(item.currentPrice) ? `Current: $${formatMoney(item.currentPrice)}` : "Current: unknown"
  });
  const purchasePrice = createElement("span", {
    className: "muted",
    text: Number.isFinite(item.purchasePrice) ? `Purchase: $${formatMoney(item.purchasePrice)}` : "Purchase: unknown"
  });

  const updated = createElement("p", {
    className: "muted",
    text: `Updated: ${new Date(item.updated).toLocaleDateString()}`
  });

  const actions = createElement("div", { className: "action-row" });
  const overrideBtn = createElement("button", { className: "secondary", text: "Override Price" });

  const nameBtn = createElement("button", { className: "secondary", text: "Change Name" });
  const barcodeBtn = createElement("button", {
    className: "secondary",
    text: item.barcode ? "Change Barcode" : "Add Barcode"
  });
  const photoBtn = createElement("button", {
    className: "secondary",
    text: item.image instanceof Blob ? "Change Photo" : "Add Photo"
  });
  const receiptBtn = createElement("button", {
    className: "secondary",
    text: item.receipt instanceof Blob ? "Change Receipt" : "Add Receipt"
  });
  const deleteBtn = createElement("button", { className: "danger", text: "Delete Item" });

  titleRow.append(title, diffLabel);
  priceLine.append(currentPrice, purchasePrice);

  overrideBtn.addEventListener("click", () => {
    void overridePrice(item.id);
  });
  nameBtn.addEventListener("click", () => {
    void updateItemName(item.id);
  });
  barcodeBtn.addEventListener("click", () => {
    void attachItemBarcode(item.id);
  });
  photoBtn.addEventListener("click", () => {
    void updateItemFile(item.id, "image", "image/*");
  });
  receiptBtn.addEventListener("click", () => {
    void updateItemFile(item.id, "receipt", "application/pdf");
  });
  deleteBtn.addEventListener("click", () => {
    void deleteItem(item.id);
  });

  actions.append(overrideBtn, nameBtn, barcodeBtn, photoBtn, receiptBtn, deleteBtn);
  details.append(titleRow, meta);
  if (description) {
    details.appendChild(description);
  }
  details.append(priceLine, updated);

  const isAuthed = !!(session && session.user);

  if (item.image instanceof Blob) {
    const image = createElement("img", { className: "thumb" });
    image.alt = `${item.name} photo`;
    image.src = trackedObjectUrl(item.image);
    media.appendChild(image);
  } else if (item.imagePath && isAuthed) {
    const placeholder = createElement("div", { className: "thumb" });
    placeholder.style.display = 'grid';
    placeholder.style.placeItems = 'center';
    placeholder.textContent = 'Loading...';
    media.appendChild(placeholder);

    void (async () => {
      try {
        const dl = await storage.downloadFile(item.imagePath, 'image');
        if (!dl.success) return;
        const blob = dl.data;
        const img = createElement('img', { className: 'thumb' });
        img.alt = `${item.name} photo`;
        img.src = trackedObjectUrl(blob);
        placeholder.replaceWith(img);
      } catch (e) {
        console.warn('Failed to render photo from storage', e);
        placeholder.textContent = 'Photo unavailable';
      }
    })();
  } else if (item.imageUrl) {
    const image = createElement("img", { className: "thumb" });
    image.alt = `${item.name} product image`;
    image.src = item.imageUrl;
    media.appendChild(image);
  }

  if (item.receipt instanceof Blob) {
    const receipt = createElement("a", { text: "Open receipt" });
    receipt.href = trackedObjectUrl(item.receipt);
    receipt.target = "_blank";
    receipt.rel = "noopener noreferrer";
    media.appendChild(receipt);
  } else if (item.receiptPath && isAuthed) {
    const receipt = createElement("a", { text: "Open receipt" });
    receipt.href = '#';
    receipt.addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        const dl = await storage.downloadFile(item.receiptPath, 'receipt');
        if (!dl.success) return;
        const blob = dl.data;
        const url = trackedObjectUrl(blob);
        receipt.href = url;
        window.open(url, '_blank');
      } catch (err) {
        console.warn('Failed to render receipt from storage', err);
        alert('Could not open receipt.');
      }
    });
    media.appendChild(receipt);
  }

  layout.append(details, media);
  itemCard.append(layout, actions);
  return itemCard;
}

function pluralize(count, singular, plural = `${singular}s`) {
  return count === 1 ? singular : plural;
}

function sumItemValue(items) {
  return items.reduce((total, item) => {
    return Number.isFinite(item.currentPrice) ? total + item.currentPrice : total;
  }, 0);
}

function getCollectionItems(collection, items) {
  return items.filter(item => item.collectionId === collection.id);
}

function getRoomItems(room, items) {
  return items.filter(item => item.roomId === room.id);
}

function itemMatchesSearch(item, searchTerm) {
  if (!searchTerm) return true;

  const haystack = [
    item.name,
    item.barcode,
    item.brand,
    item.category,
    item.description
  ].filter(Boolean).join(" ").toLowerCase();

  return haystack.includes(searchTerm);
}

function createStat(text) {
  return createElement("span", { className: "pill", text });
}

function makeInteractiveTile(tile, callback) {
  tile.setAttribute("role", "button");
  tile.tabIndex = 0;
  tile.addEventListener("click", callback);
  tile.addEventListener("keydown", event => {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      callback();
    }
  });
}

function setView(roomId = null) {
  currentRoomId = roomId;
  currentCollectionId = null;
  document.getElementById("search").value = "";
  void render();
}

function createNavButton(text, callback) {
  const button = createElement("button", { className: "secondary", text });
  button.addEventListener("click", callback);
  return button;
}

function updateViewHeader(room) {

  nav.innerHTML = "";

function updateToolbar(room) {

  const homeButton = document.getElementById("homeBtn");

function buildRoomTile(room, roomItems) {
  const tile = createElement("article", { className: "tile" });
  const titleBlock = createElement("div");
  const title = createElement("h3", { className: "tile-title", text: room.name });
  const stats = createElement("div", { className: "tile-stats" });

  makeInteractiveTile(tile, () => setView(room.id));
  titleBlock.appendChild(title);
  stats.append(
    createStat(`${roomItems.length} ${pluralize(roomItems.length, "item")}`),

function buildDashboardView(container, rooms, items, searchTerm) {
  const grid = createElement("div", { className: "tile-grid" });

  const visibleRooms = rooms.filter(room => {
    const roomItems = getRoomItems(room, items);
    if (!searchTerm) return true;
    return room.name.toLowerCase().includes(searchTerm)
      || roomItems.some(item => itemMatchesSearch(item, searchTerm));
  });

  if (visibleRooms.length === 0) {
    container.appendChild(createElement("div", {
      className: "empty-state",
      text: searchTerm ? "No rooms match the current search." : "No rooms yet."
    }));
    return;
  }

  visibleRooms.forEach(room => {
    const roomItems = getRoomItems(room, items);
    grid.appendChild(buildRoomTile(room, roomItems));
  });

  container.appendChild(grid);
}

function buildRoomView(container, room, collections, items, searchTerm) {
  const roomCollection = collections.find(c => c.roomId === room.id);
  if (!roomCollection) {
    container.appendChild(createElement("div", {
      className: "empty-state",
      text: "No items in this room."
    }));
    return;
  }

  const roomItems = getCollectionItems(roomCollection, items)
    .filter(item => itemMatchesSearch(item, searchTerm));

  if (roomItems.length === 0) {
    container.appendChild(createElement("div", {
      className: "empty-state",
      text: searchTerm ? "No items match the current search." : "No items yet."
    }));
    return;
  }

  roomItems.forEach(item => {
    container.appendChild(buildItemCard(item));
  });
}

async function render() {
  cleanupObjectUrls();

  const [rooms, collections, items] = await Promise.all([
    getAllRecords(STORE_ROOMS),
    getAllRecords(STORE_COLLECTIONS),
    getAllRecords(STORE_ITEMS)
  ]);

  const container = document.getElementById("collections");
  const searchTerm = document.getElementById("search").value.trim().toLowerCase();
  const room = currentRoomId ? rooms.find(entry => entry.id === currentRoomId) : null;

  container.innerHTML = "";
  document.getElementById("totalValue").textContent = formatMoney(sumItemValue(items));

  document.getElementById("itemCount").textContent = items.length;

  updateViewHeader(room);
  updateToolbar(room);

  if (room) {
    buildRoomView(container, room, collections, items, searchTerm);
  } else {
    buildDashboardView(container, rooms, items, searchTerm);
  }
}

async function addItem(collectionId) {
  if (isAddingItem) {
    alert("Finish the current item before adding another.");
    return;
  }

  isAddingItem = true;
  try {
    const name = prompt("Item name?");
    if (name === null) return;

    const trimmedName = name.trim();
    if (!trimmedName) {
      alert("Item name cannot be empty.");
      return;
    }

    let purchaseInput = parsePriceInput("Purchase price? Leave blank if unknown.");
    while (purchaseInput.value === undefined) {
      purchaseInput = parsePriceInput("Purchase price? Leave blank if unknown.");
    }
    if (purchaseInput.cancelled) return;

    const collections = await getAllRecords(STORE_COLLECTIONS);
    const collection = collections.find(c => c.id === collectionId);
    const roomId = collection ? collection.roomId : null;

    await addRecord(STORE_ITEMS, {
      name: trimmedName,
      barcode: "",
      brand: "",
      category: "",
      description: "",
      image: null,
      imageUrl: "",
      receipt: null,
      purchasePrice: purchaseInput.value,
      estimatedPrice: null,
      currentPrice: purchaseInput.value,
      updated: Date.now(),
      collectionId,
      roomId
    });

    await render();
  } finally {
    isAddingItem = false;
  }
}

async function addScannedItem(collectionId) {
  if (isAddingItem) {
    alert("Finish the current item before adding another.");
    return;
  }

  isAddingItem = true;
  try {
    const barcode = await scanBarcode();
    if (!barcode || typeof barcode !== "string") return;

    const details = await fetchBarcodeDetails(barcode);

    const collections = await getAllRecords(STORE_COLLECTIONS);
    const collection = collections.find(c => c.id === collectionId);
    const roomId = collection ? collection.roomId : null;

    await addRecord(STORE_ITEMS, {
      name: details.name,
      barcode,
      brand: details.brand,
      category: details.category,
      description: details.description,
      image: null,
      imageUrl: details.imageUrl,
      receipt: null,
      purchasePrice: details.price,
      estimatedPrice: details.price,
      currentPrice: details.price,
      updated: Date.now(),
      collectionId,
      roomId
    });

    await render();

    if (!details.found) {
      alert("The item was saved with its barcode, but no product details were found.");
    } else if (details.price === null) {
      alert("The item was saved, but no price was found for this barcode.");
    }
  } catch (err) {
    console.error("Failed to scan item:", err);
    alert("Could not scan the item.");
  } finally {
    isAddingItem = false;
  }
}

async function updateItemFile(id, field, type) {
  const file = await pickFile(type);
  if (!file) return;

  const item = await getRecord(STORE_ITEMS, id);
  if (!item) return;

  item[field] = file;

  const isAuthed = !!(session && session.user);
  const userId = session?.user?.id;
  const bucketType = field === 'image' ? 'image' : 'receipt';
  const storagePath = `${userId}/${crypto.randomUUID()}${field === 'image' ? '.jpg' : '.pdf'}`;

  if (isAuthed) {
    try {
      const upload = await storage.uploadFile(file, storagePath, bucketType);
      if (upload?.success && upload.source === 'supabase') {
        if (field === 'image') item.imagePath = storagePath;
        if (field === 'receipt') item.receiptPath = storagePath;
      }
    } catch (e) {
      console.warn('Upload failed; keeping offline backup only.', e);
    }
  }

  item.updated = Date.now();
  try {
    await putRecord(STORE_ITEMS, item);
    await render();
  } catch (err) {
    console.error("Failed to update item file:", err);
    alert("Could not attach the file. Check the browser console for details.");
  }
}

function pickFile(type) {
  return new Promise(resolve => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = type;
    input.style.position = "fixed";
    input.style.left = "-9999px";
    document.body.appendChild(input);

    let settled = false;
    const finalize = value => {
      if (!settled) {
        settled = true;
        input.remove();
        resolve(value);
      }
    };

    input.addEventListener("change", () => {
      finalize(input.files && input.files[0] ? input.files[0] : null);
    }, { once: true });

    input.addEventListener("cancel", () => {
      finalize(null);
    }, { once: true });

    window.addEventListener("focus", () => {
      setTimeout(() => {
        if (!settled) {
          finalize(input.files && input.files[0] ? input.files[0] : null);
        }
      }, 300);
    }, { once: true });

    input.click();
  });
}

async function manualBarcodeEntry(message) {
  const value = prompt(message);
  if (value === null) return undefined;

  const trimmed = value.trim();
  if (!trimmed) return null;
  return trimmed;
}

function cleanLookupText(value) {
  return typeof value === "string" ? value.trim() : "";
}

function limitLookupText(value, maxLength = 180) {
  const text = cleanLookupText(value);
  if (text.length <= maxLength) return text;
  return `${text.slice(0, maxLength - 3).trim()}...`;
}

function parseLookupPrice(value) {
  if (typeof value === "number" && Number.isFinite(value) && value >= 0) return value;
  if (typeof value !== "string") return null;
  const match = value.replace(/,/g, "").match(/\d+(?:\.\d+)?/);
  if (!match) return null;
  const price = Number(match[0]);
  return Number.isFinite(price) && price >= 0 ? price : null;
}

function extractLookupPrice(item) {
  if (!item) return null;
  const directPrice = parseLookupPrice(item.lowest_recorded_price);
  if (directPrice !== null) return directPrice;

  if (Array.isArray(item.offers)) {
    const offerPrices = item.offers
      .map(offer => parseLookupPrice(offer.price))
      .filter(price => price !== null);
    if (offerPrices.length > 0) return Math.min(...offerPrices);
  }

  return null;
}

async function fetchBarcodeLookup(barcode) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), PRICE_LOOKUP_TIMEOUT_MS);

  try {
    const response = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${encodeURIComponent(barcode)}`, {
      signal: controller.signal
    });

    if (!response.ok) return null;
    const data = await response.json();
    return data.items?.[0] || null;
  } catch {
    return null;
  } finally {
    clearTimeout(timeout);
  }
}

async function fetchBarcodeDetails(barcode) {
  const item = await fetchBarcodeLookup(barcode);
  if (!item) {
    return {
      found: false,
      name: `Scanned item ${barcode}`,
      brand: "",
      category: "",
      description: "",
      imageUrl: "",
      price: FALLBACK_PRICE
    };
  }

  const title = cleanLookupText(item.title);
  const brand = cleanLookupText(item.brand);
  const category = cleanLookupText(item.category);
  const description = limitLookupText(item.description);
  const images = Array.isArray(item.images) ? item.images : [];
  const imageUrl = images.find(url => cleanLookupText(url)) || "";
  const price = extractLookupPrice(item);

  return {
    found: true,
    name: title || [brand, category].filter(Boolean).join(" ") || `Scanned item ${barcode}`,
    brand,
    category,
    description: description === title ? "" : description,
    imageUrl,
    price
  };
}

async function fetchPrice(barcode) {
  const item = await fetchBarcodeLookup(barcode);
  return extractLookupPrice(item);
}

async function scanBarcode() {
  if (!window.ZXingBrowser || !navigator.mediaDevices) {
    return manualBarcodeEntry("Camera scanning is unavailable. Enter barcode manually (or leave empty to skip):");
  }

  return new Promise(async resolve => {
    const codeReader = new ZXingBrowser.BrowserMultiFormatReader();
    const overlay = createElement("div", { className: "scanner-overlay" });
    const panel = createElement("div", { className: "scanner-panel" });
    const label = createElement("p", {
      className: "muted",
      text: "Point the camera at a barcode, or cancel to type it manually."
    });
    const videoWrap = createElement("div", { className: "scanner-video" });
    const video = document.createElement("video");
    const spinner = createElement("div", { className: "scanner-spinner" });
    const frame = createElement("div", { className: "scanner-frame" });
    const scanLine = createElement("div", { className: "scan-line" });
    const cancelButton = createElement("button", { className: "secondary", text: "Cancel" });
    const skipButton = createElement("button", { className: "secondary", text: "Skip" });

    frame.appendChild(scanLine);
    videoWrap.appendChild(video);
    videoWrap.appendChild(frame);
    panel.append(label, spinner, videoWrap, cancelButton, skipButton);
    overlay.appendChild(panel);
    document.body.appendChild(overlay);

    let controls = null;
    let settled = false;

    const finish = async value => {
      if (settled) return;
      settled = true;
      try { controls?.stop(); } catch (error) { console.warn("Failed to stop scanner controls:", error); }
      overlay.remove();
      resolve(value);
    };

    cancelButton.addEventListener("click", async () => {
      const manual = await manualBarcodeEntry("Enter barcode manually (or leave empty to skip):");
      await finish(manual);
    });

    skipButton.addEventListener("click", async () => {
      await finish(null);
    });

    try {
      controls = await codeReader.decodeFromVideoDevice(null, video, async result => {
        if (result) {
          showToast("Barcode Found ✓");
          scanLine.classList.remove("running");
          await finish(result.getText());
        }
      });

      spinner.style.display = "none";
      frame.style.display = "block";
      requestAnimationFrame(() => scanLine.classList.add("running"));
    } catch {
      spinner.style.display = "none";
      const manual = await manualBarcodeEntry("Camera failed. Enter barcode manually (or leave empty to skip):");
      await finish(manual);
    }
  });
}

async function deleteRoom(id) {
  const confirmed = confirm("Delete this room and all its items?");
  if (!confirmed) return;

  const collections = await getAllRecords(STORE_COLLECTIONS);
  const roomCollections = collections.filter(collection => collection.roomId === id);
  const items = await getAllRecords(STORE_ITEMS);

  for (const collection of roomCollections) {
    const collectionItems = items.filter(item => item.collectionId === collection.id);
    for (const item of collectionItems) {
      await deleteRecord(STORE_ITEMS, item.id);
    }
    await deleteRecord(STORE_COLLECTIONS, collection.id);
  }

  await deleteRecord(STORE_ROOMS, id);
  if (currentRoomId === id) currentRoomId = null;
  await render();
}

  if (passwordInput) passwordInput.hidden = false;
}


function looksLikeUserNotFound(err) {
  const msg = (err?.message || '').toLowerCase();
  const status = err?.status;
  const code = err?.code;

  // Heuristic: Supabase error surface varies by auth settings.
  return (
    msg.includes('user') && (msg.includes('not found') || msg.includes('no user') || msg.includes('invalid login'))
    || msg.includes('invalid login credentials')
    || msg.includes('bad credentials')
    || status === 400
    || code === 'invalid_login'
  );
}

function wireAuthUI() {
  const loginBtn = document.getElementById('loginBtn');
  const signupBtn = document.getElementById('signupBtn');
  const signOutBtn = document.getElementById('signOutBtn');
  const emailInput = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const overlay = document.getElementById('authOverlay');
  const openBtn = document.getElementById('openAuthOverlayBtn');
  const closeBtn = document.getElementById('closeAuthOverlayBtn');
  const authStatus = document.getElementById('authStatus');

  const setStatus = (text) => {
    if (authStatus) authStatus.textContent = text || '';
  };

  const readCreds = () => {
    const email = (emailInput?.value || '').trim();
    const password = passwordInput?.value || '';
    return { email, password };
  };

  const showOverlay = () => {
    overlay?.classList.add('show');
    overlay?.setAttribute('aria-hidden', 'false');
  };
  const hideOverlay = () => {
    overlay?.classList.remove('show');
    overlay?.setAttribute('aria-hidden', 'true');
  };

  if (openBtn) {
    openBtn.addEventListener('click', () => {
      setStatus('');
      showOverlay();
    });
  }

  if (closeBtn) {
    closeBtn.addEventListener('click', () => {
      setStatus('');
      hideOverlay();
    });
  }

  overlay?.addEventListener('click', (e) => {
    if (e.target === overlay) hideOverlay();
  });

  if (loginBtn) {
    loginBtn.addEventListener('click', async () => {
      const { email, password } = readCreds();
      if (!email) return alert('Enter an email address.');
      if (!password) return alert('Enter your password.');

      try {
        setStatus('Logging you in...');
        await signInWithPassword(email, password);
        setAuthUI(true);
        hideOverlay();
      } catch (e) {
        console.error('signInWithPassword failed', e);
        setStatus('');
        if (looksLikeUserNotFound(e)) {
          alert('No account found for that email. Use Sign up.');
          return;
        }
        alert('Login failed. Check credentials.');
      }
    });
  }

  if (signupBtn) {
    signupBtn.addEventListener('click', async () => {
      const { email, password } = readCreds();
      if (!email) return alert('Enter an email address.');
      if (!password) return alert('Enter a password.');

      try {
        setStatus('Creating account...');
        await signUpWithPassword(email, password);
        setAuthUI(false);
        alert('Account created. Logging you in...');
      } catch (e) {
        console.error('signUpWithPassword failed', e);
        setStatus('');
        alert('Sign up failed. Check console for details.');
      }
    });
  }

  if (signOutBtn) {
    signOutBtn.addEventListener('click', async () => {
      try {
        await signOut();
        location.reload();
      } catch (e) {
        console.error('signOut failed', e);
      }
    });
  }
}



window.addEventListener("beforeinstallprompt", event => {
  event.preventDefault();
  deferredPrompt = event;
  document.getElementById("installBtn").hidden = false;
});

document.getElementById("installBtn").addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById("installBtn").hidden = true;
});

document.getElementById("scanBtn").addEventListener("click", async () => {
  const rooms = await getAllRecords(STORE_ROOMS);
  if (rooms.length === 0) {
    alert("Create a room first.");
    return;
  }
  const collections = await getAllRecords(STORE_COLLECTIONS);
  const roomCollection = collections.find(c => c.roomId === currentRoomId);
  if (roomCollection) {
    void addScannedItem(roomCollection.id);
  }
});

document.getElementById("addItemBtn").addEventListener("click", async () => {
  if (!currentRoomId) {
    alert("Select a room first.");
    return;
  }
  const collections = await getAllRecords(STORE_COLLECTIONS);
  const roomCollection = collections.find(c => c.roomId === currentRoomId);
  if (!roomCollection) {
    alert("No collection found for the selected room. Create a room again.");
    return;
  }
  void addItem(roomCollection.id);
});

})();
